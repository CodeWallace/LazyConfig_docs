site_name: LazyConfig
site_description: 商业级 Excel → JSON → Config 自动化配置工具，专为 Unity 游戏开发打造
site_url: https://lazyconfig.github.io

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    primary: blue
    accent: cyan
  features:
    - navigation.sidebar
    - navigation.expand
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - navigation.indexes
  extra_css:
    - assets/css/custom.css

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - codehilite:
      guess_lang: false

nav:
  - 首页: index.md
  - 使用指南:
    - 快速开始: getting-started.md
    - Excel 格式规范: excel-format.md
  - 核心功能:
    - Schema 语法: schema.md
    - 数据类型: data-types.md
    - 运行时 API: runtime-api.md
  - 高级扩展:
    - 扩展机制: extension.md
    - 使用示例: examples.md
  - 部署发布: deploy.md